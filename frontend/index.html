<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>理财分析面板</title>
    <link rel="icon" type="image/png" href="./images/logo.png" />
    <link rel="apple-touch-icon" href="./images/logo.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-a"></div>
    <div class="bg-glow bg-glow-b"></div>
    <main class="container">
      <header class="header">
        <h1>投资理财分析</h1>
        <p>CURRENT INVESTMENT TRACKER</p>
      </header>

      <section id="overviewCards" class="overview-grid">
        <article class="overview-card">
          <span class="k">记录天数</span>
          <strong id="ovDays">0</strong>
        </article>
        <article class="overview-card">
          <span class="k">当日总投入</span>
          <strong id="ovCost">0.00</strong>
        </article>
        <article class="overview-card">
          <span class="k">当日总奖金</span>
          <strong id="ovBonus">0.00</strong>
        </article>
        <article class="overview-card">
          <span class="k">当日总盈利</span>
          <strong id="ovDayProfit">0.00</strong>
        </article>
        <article class="overview-card">
          <span class="k">累计总盈利</span>
          <strong id="ovAllProfit">0.00</strong>
        </article>
      </section>

      <div class="form-banner">
        <img class="form-banner-img" src="./images/fage.gif" alt="niao" />
      </div>

      <section class="card form-card">
        <div class="section-head">
          <h2>新增记录</h2>
          <span class="section-mark">填写4个项目后保存</span>
        </div>
        <form id="recordForm">
          <div class="grid date-row">
            <label id="datePickerTrigger" class="date-picker-label">
              <span class="date-label-top">
                <span>日期</span>
                <span class="picker-tip">点击选择</span>
              </span>
              <input id="recordDate" type="date" required />
            </label>
          </div>
          <div class="project-head">
            <span>项目</span>
            <span>投入成本</span>
            <span>奖金收入</span>
            <span>目标</span>
          </div>
          <div id="projectInputs" class="project-grid"></div>
          <div class="action-row">
            <button type="submit">保存记录</button>
          </div>
          <p id="formMsg" class="msg"></p>
        </form>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>历史记录</h2>
          <span class="section-mark">按日期展示</span>
        </div>
        <div id="recordsList" class="records-list"></div>
      </section>

      <footer class="footer-note">Inspired by modern design dashboard systems</footer>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
