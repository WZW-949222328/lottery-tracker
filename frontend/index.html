<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>彩票理财分析面板</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>彩票理财分析面板</h1>
        <p>暗色科技风记录与统计</p>
      </header>

      <section class="card">
        <h2>新增/更新每日记录</h2>
        <form id="recordForm">
          <div class="grid">
            <label>
              日期
              <input id="recordDate" type="date" required />
            </label>
          </div>
          <div id="projectInputs" class="project-grid"></div>
          <button type="submit">保存当天记录</button>
          <p id="formMsg" class="msg"></p>
        </form>
      </section>

      <section class="card">
        <h2>历史记录</h2>
        <div class="table-wrap">
          <table id="recordsTable">
            <thead id="recordsHead"></thead>
            <tbody id="recordsBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
